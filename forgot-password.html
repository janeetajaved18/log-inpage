<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <title>Forgot Password</title>
</head>

<body class="min-h-screen bg-[#f5f6ff] flex items-center justify-center p-5">

    <div class="bg-white w-full max-w-[530px] rounded-2xl shadow-lg p-8 sm:p-12">

        <h1 class="text-3xl sm:text-4xl font-extrabold text-center text-[#17213d]">
            Forgot password?
        </h1>

        <p class="text-center text-gray-500 mt-3">
            Enter your email and we will send you an OTP.
        </p>

        <form class="mt-10">

            <label class="font-bold text-[#17213d]">
                Email
            </label>

            <input 
                type="email"
                placeholder="✉  Enter your email"
                class="w-full border border-gray-300 rounded-lg p-4 mt-2 outline-none focus:border-[#6546d9]"
            >

            <a href="otp.html"
                class="block text-center w-full bg-[#6546d9] hover:bg-[#5435c5] text-white font-bold py-4 rounded-lg mt-8">
                Send OTP
            </a>

        </form>

        <a href="login.html"
            class="block text-center text-[#6546d9] font-bold mt-7">
            ← Go back to Login
        </a>

    </div>

</body>
</html>
