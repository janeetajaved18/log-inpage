<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <title>Sign Up</title>
</head>

<body class="min-h-screen bg-[#f5f6ff] flex items-center justify-center p-5">

    <div class="bg-white w-full max-w-[530px] rounded-2xl shadow-lg p-8 sm:p-12">

        <div class="flex justify-center mb-5">
            <div class="bg-[#f0edff] w-16 h-16 rounded-xl flex items-center justify-center">
                <span class="text-4xl font-extrabold text-[#6546d9]">A</span>
            </div>
        </div>

        <h1 class="text-3xl sm:text-4xl font-extrabold text-center text-[#17213d]">
            Create your account
        </h1>

        <p class="text-center text-gray-500 mt-2">
            Sign up to get started with us
        </p>

        <form class="mt-8">

            <label class="font-bold text-[#17213d]">
                Full Name
            </label>

            <input 
                type="text"
                placeholder="👤  Enter your full name"
                class="w-full border border-gray-300 rounded-lg p-4 mt-2 outline-none focus:border-[#6546d9]"
            >

            <label class="font-bold text-[#17213d] block mt-5">
                Email
            </label>

            <input 
                type="email"
                placeholder="✉  Enter your email"
                class="w-full border border-gray-300 rounded-lg p-4 mt-2 outline-none focus:border-[#6546d9]"
            >

            <label class="font-bold text-[#17213d] block mt-5">
                Password
            </label>

            <input 
                type="password"
                placeholder="🔒  Create a password"
                class="w-full border border-gray-300 rounded-lg p-4 mt-2 outline-none focus:border-[#6546d9]"
            >

            <label class="font-bold text-[#17213d] block mt-5">
                Confirm Password
            </label>

            <input 
                type="password"
                placeholder="🔒  Confirm your password"
                class="w-full border border-gray-300 rounded-lg p-4 mt-2 outline-none focus:border-[#6546d9]"
            >

            <button 
                type="submit"
                class="w-full bg-[#6546d9] hover:bg-[#5435c5] text-white font-bold py-4 rounded-lg mt-8">
                Sign Up
            </button>

        </form>

        <div class="flex items-center gap-4 my-7 text-gray-500">
            <hr class="flex-1">
            <span>or</span>
            <hr class="flex-1">
        </div>

        <p class="text-center text-gray-500">
            Already have an account?
            <a href="login.html" class="text-[#6546d9] font-bold">
                Login
            </a>
        </p>

    </div>

</body>
</html>
